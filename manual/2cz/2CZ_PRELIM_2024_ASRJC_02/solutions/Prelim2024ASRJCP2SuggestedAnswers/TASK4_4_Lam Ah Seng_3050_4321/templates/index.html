<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Upload Image</title>
</head>
<body>
	<h1>Upload Image</h1>
	<hr>
	
	<form method="POST" enctype="multipart/form-data">
		<p>Select image:</p>
		<input type="file" name="image" /><br />
		<p>Enter a 26-letter substitution cipher key (optional):</p>
		<input type="text" name="key" /><br />
		<input type="submit" value="Upload Image" />
	</form>

	<hr>
    {% if success_msg %}
    <h2>{{ success_msg }}</h2>
    <hr>
    {% endif %}
    
    <!-- Display encrypted filenames and images -->
    {% if entries %}
    <h1>Stored images</h1>
    <table border="1">
        <tr>
            <th>Encrypted Filename</th>
            <th>Datetime</th>
            <th>Image</th>
        </tr>
        {% for entry in entries %}
        <tr>
            <td>{{ entry[0] }}</td>
            <td>{{ entry[1] }}</td>
            <td><img src="{{ url_for('get_file', filename=entry[0]) }}"></td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}
</body>
</html>
